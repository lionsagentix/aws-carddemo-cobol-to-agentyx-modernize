# [agentyx-provenance v1]
spring:
  application:
    name: carddemo
  profiles:
    active: dev
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:carddemo;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
  h2:
    console:
      enabled: true
  flyway:
    enabled: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/carddemo}
    username: ${DB_USER:carddemo}
    password: ${DB_PASSWORD:carddemo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  batch:
    jdbc:
      initialize-schema: always
server:
  port: 8080
